name: Build and Deploy Murmur


on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]


env:
  REGISTRY: ghcr.io
  INGEST_IMAGE_NAME: smparc/murmur-ingest
  INFERENCE_IMAGE_NAME: smparc/murmur-inference


jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - uses: actions/checkout@v4


      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}


      - name: Install dependencies
        run: |
          pip install -e ".[dev]"


      - name: Lint with ruff
        run: ruff check src/ tests/ orchestration/


      - name: Run tests
        run: pytest tests/ -v --tb=short --ignore=tests/test_integration.py


  build-and-push-images:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}


      - name: Extract metadata for Ingest Image
        id: meta-ingest
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.INGEST_IMAGE_NAME }}


      - name: Build and push Ingest Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.ingest
          push: true
          tags: ${{ steps.meta-ingest.outputs.tags }}
          labels: ${{ steps.meta-ingest.outputs.labels }}


      - name: Extract metadata for Inference Image
        id: meta-inference
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.INFERENCE_IMAGE_NAME }}


      - name: Build and push Inference Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.inference
          push: true
          tags: ${{ steps.meta-inference.outputs.tags }}
          labels: ${{ steps.meta-inference.outputs.labels }}


  deploy-to-k8s:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'


    steps:
      - name: Checkout repository
        uses: actions/checkout@v4


      - name: Dry Run Kubernetes Manifests
        run: |
          echo "Simulating kubectl apply -f deploy/k8s/"
          # kubectl apply -f deploy/k8s/ --kubeconfig <(echo "${{ secrets.KUBECONFIG }}")