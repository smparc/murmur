name: Build and Deploy Murmur

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  INGEST_IMAGE_NAME: smparc/murmur-ingest
  INFERENCE_IMAGE_NAME: smparc/murmur-inference

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Ingest Image
        id: meta-ingest
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.INGEST_IMAGE_NAME }}

      - name: Build and push Ingest Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.ingest
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-ingest.outputs.tags }}
          labels: ${{ steps.meta-ingest.outputs.labels }}

      - name: Extract metadata (tags, labels) for Inference Image
        id: meta-inference
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.INFERENCE_IMAGE_NAME }}

      - name: Build and push Inference Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.inference
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta-inference.outputs.tags }}
          labels: ${{ steps.meta-inference.outputs.labels }}

  deploy-to-k8s:
    needs: build-and-push-images
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      # In a real environment, you would configure your Kubeconfig here using a secret
      # to apply the manifests directly to your production cluster.
      - name: Dry Run Kubernetes Manifests
        run: |
          echo "Simulating kubectl apply -f deploy/k8s/"
          # kubectl apply -f deploy/k8s/ --kubeconfig <(echo "${{ secrets.KUBECONFIG }}")